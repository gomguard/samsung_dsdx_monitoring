<div id="detailModal" class="modal-overlay hidden" onclick="closeModalOnOverlay(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <div>
                <div class="modal-title" id="modalTitle">비정상 데이터 상세</div>
                <div class="modal-subtitle" id="modalSubtitle"></div>
            </div>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="error-type-selector" id="errorTypeSelector"></div>
            <div class="loading" id="modalLoading">
                <div class="loading-spinner"></div>
                데이터를 불러오는 중...
            </div>
            <div id="modalContent"></div>
        </div>
        <div class="modal-footer">
            <div class="modal-footer-left">
                <span id="modalInfo"></span>
                <button class="app-btn app-btn-sm" onclick="copyCheckedToReport()" id="copyAllBtn" style="background:#4338ca;color:#fff;border-color:#4338ca;" onmouseenter="this.style.opacity='0.85'" onmouseleave="this.style.opacity='1'">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    <span id="copyBtnText">선택 복사 (0건)</span>
                </button>
            </div>
            <div id="modalPaginationContainer"></div>
        </div>
    </div>
</div>
