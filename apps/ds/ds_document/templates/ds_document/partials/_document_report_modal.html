<!-- 보고서 출력 팝업 -->
<div class="report-popup-overlay" id="reportPopupOverlay" onclick="closeReportPopup(event)">
    <div class="report-popup" id="reportPopup" onclick="event.stopPropagation()">
        <div class="report-popup-header">
            <span class="report-popup-title" id="reportPopupTitle">문서 보기</span>
            <div class="report-popup-actions">
                <button class="app-btn app-btn-sm app-btn-cancel" onclick="printReportContent()" title="인쇄">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                    인쇄
                </button>
                <button class="app-btn app-btn-sm app-btn-cancel" onclick="copyShareLink()" title="공유 링크 복사">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    공유
                </button>
                <button class="app-btn app-btn-sm app-btn-cancel" onclick="openShareMgmt()" title="공유 관리">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    공유 관리
                </button>
                <button class="app-btn app-btn-sm app-btn-cancel" onclick="toggleFullscreen()" title="전체화면">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                    전체화면
                </button>
                <button class="app-btn app-btn-sm app-btn-cancel" onclick="closeReportPopup()" title="닫기">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    닫기
                </button>
            </div>
        </div>
        <div class="report-popup-body" id="reportPopupBody">
            <div class="report-doc-title" id="reportDocTitle" style="display:none;"></div>
            <div class="ck-content"></div>
        </div>
    </div>
</div>
