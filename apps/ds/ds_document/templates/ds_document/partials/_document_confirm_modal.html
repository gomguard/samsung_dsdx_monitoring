<!-- 확인 팝업 -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-popup">
        <svg class="confirm-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <div class="confirm-title" id="confirmTitle">확인</div>
        <div class="confirm-message" id="confirmMessage"></div>
        <div class="confirm-actions">
            <button class="app-btn app-btn-md app-btn-cancel" onclick="closeConfirm()">취소</button>
            <button class="app-btn app-btn-md app-btn-delete" id="confirmOkBtn">차단</button>
        </div>
    </div>
</div>
