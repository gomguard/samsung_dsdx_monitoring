{% extends 'base.html' %}
{% load static %}

{% block title %}DS - 파일서버 탐색{% endblock %}

{% block extra_css %}
<style>
    :root { --page-color: {{ layer.color }}; }

    .toolbar { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
    .toolbar .app-btn-back { flex-shrink: 0; margin-top: 17px; }
    .toolbar #filterBar { flex: 1; }

    .page-title {
        font-size: 22px;
        font-weight: 700;
        color: var(--text-primary);
        margin-bottom: 24px;
    }


    /* 파일 탐색기 테이블 */
    .explorer {
        background: #fff;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 20px;
    }

    .explorer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        background: #f8fafc;
        border-bottom: 1px solid var(--border-color);
    }
    .explorer-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
    }
    .explorer-count {
        font-size: 13px;
        color: var(--text-secondary);
    }

    .explorer table { width: 100%; border-collapse: collapse; }
    .explorer th {
        padding: 10px 16px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
        text-align: left;
        background: #f8fafc;
        border-bottom: 1px solid var(--border-color);
        user-select: none;
    }
    .explorer td {
        padding: 10px 16px;
        font-size: 13px;
        color: var(--text-primary);
        border-bottom: 1px solid #f1f5f9;
    }
    .explorer tbody tr:last-child td { border-bottom: none; }
    .explorer tbody tr:hover { background: #f0f7ff; }

    .explorer .col-icon { width: 40px; text-align: center; }
    .explorer .col-icon svg { width: 18px; height: 18px; vertical-align: middle; }
    .explorer .col-name { font-weight: 500; }
    .explorer .col-type { width: 100px; color: var(--text-secondary); }
    .explorer .col-modified { width: 220px; color: var(--text-secondary); }
    .explorer .col-size { width: 120px; text-align: right; font-variant-numeric: tabular-nums; }

    /* 폴더 행 — 클릭 가능 */
    .explorer .row-folder { cursor: pointer; }
    .explorer .row-folder .col-icon svg { color: #f59e0b; }
    .explorer .row-folder:hover { background: #fefce8; }

    /* 토글 화살표 */
    .explorer .col-toggle { width: 30px; text-align: center; }
    .explorer .col-toggle svg {
        width: 14px; height: 14px;
        color: #94a3b8;
        transition: transform 0.2s;
    }
    .explorer .row-folder.open .col-toggle svg { transform: rotate(90deg); }

    /* 파일 행 (폴더 하위) */
    .explorer .row-file .col-icon svg { color: #94a3b8; }
    .explorer .row-file .col-name { padding-left: 12px; font-weight: 400; }
    .explorer .file-rows { display: none; }
    .explorer .file-rows.open { display: table-row-group; }

    .explorer-empty {
        padding: 32px 20px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 14px;
    }

    /* 체크박스 */
    .explorer .col-check { width: 36px; text-align: center; }
    .explorer .col-check input[type="checkbox"] {
        width: 15px; height: 15px; cursor: pointer; accent-color: var(--page-color);
    }

    /* 이동 액션 바 */
    .move-bar {
        display: none;
        align-items: center;
        gap: 12px;
        padding: 12px 20px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        border-radius: 10px;
        margin-bottom: 16px;
    }
    .move-bar.visible { display: flex; }
    .move-bar .move-count {
        font-size: 13px;
        color: var(--text-primary);
        font-weight: 500;
    }

    /* 상태 메시지 */
    .status-message {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-secondary);
        font-size: 14px;
    }
</style>
{% endblock %}

{% block content %}
<div class="page-title">파일서버 탐색</div>

<div class="toolbar">
    <a id="backLink" class="app-btn app-btn-md app-btn-back" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
        <span id="backLabel">DS Layer 1</span>
    </a>
    <div id="filterBar"></div>
</div>

<div id="moveBar" class="move-bar">
    <span class="move-count" id="moveCount">0개 선택</span>
    <button class="app-btn app-btn-sm app-btn-primary" onclick="moveToBackup()">백업으로 이동</button>
</div>

<div id="content">
    <div class="status-message"><div class="loading-spinner"></div> 불러오는 중...</div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/ds/ds_layer1/fileserver.js' %}"></script>
{% endblock %}
