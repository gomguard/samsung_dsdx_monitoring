<!-- 상세보기 모달 -->
<div class="detail-modal-overlay" id="detailModalOverlay" onclick="closeDetailModal(event)">
    <div class="detail-modal" onclick="event.stopPropagation()">
        <div class="detail-modal-header">
            <h3 id="detailModalTitle">상세 정보</h3>
            <button class="detail-modal-close" onclick="closeDetailModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="detail-modal-content">
            <div class="detail-item">
                <span class="detail-item-label">저장자</span>
                <span class="detail-item-value" id="detailCreatedId">-</span>
            </div>
            <div class="detail-item">
                <span class="detail-item-label">저장일시</span>
                <span class="detail-item-value" id="detailCreatedAt">-</span>
            </div>
        </div>
    </div>
</div>
