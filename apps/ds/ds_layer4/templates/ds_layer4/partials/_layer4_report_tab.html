<div class="layer-header">
    <div class="header-content">
        <div class="header-info">
            <div class="layer-number">{{ layer.number }}</div>
            <div class="header-text">
                <h1>{{ layer.name }}</h1>
                <p>{{ layer.description }}</p>
            </div>
        </div>
        <div class="header-badge">{{ data_source.name }}</div>
    </div>
</div>

<div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;">
    <a href="/ds/layer2/" class="app-btn app-btn-md app-btn-back" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
        검수 페이지로
    </a>
    <div id="reportControlsBar"></div>
    <div style="display:flex; align-items:center; gap:8px; margin-left:auto;">
        <button class="app-btn app-btn-md app-btn-cancel" id="saveFileInfoBtn" onclick="saveFileInfo()" style="color:#1a365d;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg><span id="saveFileInfoBtnText">파일용량 저장</span></button>
        <button class="app-btn app-btn-md" id="closeBtn" onclick="closeReport()" style="background:#7e6b9b;color:#fff;border-color:#7e6b9b;min-width:100px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span id="closeBtnText">마감</span></button>
        <button class="app-btn app-btn-md" id="cancelCloseBtn" onclick="cancelClose()" style="display:none;background:#ef4444;color:#fff;border-color:#ef4444;min-width:120px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg><span>마감 취소</span></button>
    </div>
</div>

<div class="closed-banner hidden" id="closedBanner">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
    <span id="closedBannerText">이 날짜는 마감되었습니다.</span>
</div>

<div class="summary-grid">
    <div class="summary-card">
        <div class="summary-card-header">
            <span class="summary-label">저장된 리테일러</span>
            <div class="summary-icon" style="background: #dbeafe; color: #2563eb;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="2" y1="12" x2="22" y2="12"/>
                    <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                </svg>
            </div>
        </div>
        <div class="summary-value" id="totalRetailers">-</div>
    </div>
    <div class="summary-card">
        <div class="summary-card-header">
            <span class="summary-label">총 이상치</span>
            <div class="summary-icon" style="background: #fee2e2; color: #dc2626;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
            </div>
        </div>
        <div class="summary-value" id="totalAnomalies">-</div>
    </div>
    <div class="summary-card">
        <div class="summary-card-header">
            <span class="summary-label">스크린샷</span>
            <div class="summary-icon" style="background: #dbeafe; color: #2563eb;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                </svg>
            </div>
        </div>
        <div class="summary-value" id="screenshotStatus">-</div>
    </div>
    <div class="summary-card">
        <div class="summary-card-header">
            <span class="summary-label">원인 입력</span>
            <div class="summary-icon" style="background: #dcfce7; color: #16a34a;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
            </div>
        </div>
        <div class="summary-value" id="filledCause">-</div>
    </div>
</div>

<div class="report-section">
    <div class="section-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <span class="section-title">저장된 보고서</span>
            <span class="section-badge" id="reportCount">0개</span>
        </div>
        <div style="display: flex; gap: 12px; align-items: center;">
            <div id="reportViewToggle" class="fb-toggle"></div>
            <button class="app-btn app-btn-md app-btn-outline" onclick="openReportOutput()" id="reportOutputBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                보고서 출력
            </button>
        </div>
    </div>
    <div id="reportTableArea">
    <div class="table-scroll-wrapper">
        <div id="reportContent">
            <div class="loading-spinner">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
    <div id="reportActions" style="text-align: right; padding: 16px 24px 20px;"></div>
    </div>
    {% include 'ds_layer4/partials/_layer4_file_tab.html' %}
</div>
