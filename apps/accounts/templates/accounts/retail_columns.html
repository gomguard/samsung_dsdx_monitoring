{% extends 'accounts/admin_base.html' %}
{% load static %}

{% block title %}수집항목 관리 - 관리자{% endblock %}

{% block admin_css %}
<style>
/* 페이지 헤더 */
.admin-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}
.admin-title { font-size: 24px; font-weight: 700; color: var(--text-primary); }
.admin-title-sub { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }

/* 흰색 카드 섹션 */
.card-section {
    background: #fff;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    overflow-x: auto;
}

/* 비활성 행 */
.ct tbody tr.inactive { opacity: 0.5; }

/* 상태 도트 */
.status-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    cursor: pointer;
}
.status-dot.active { background: #22c55e; }
.status-dot.inactive { background: #ef4444; }

/* 배지 */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
.badge-type { background: var(--bg-secondary); color: var(--text-secondary); }

/* 헤더 토글 필터 */
.ct thead th.toggle-filter { cursor: pointer; user-select: none; position: relative; }
.ct thead th.toggle-filter:hover { background: var(--bg-secondary); }
.ct thead th.toggle-active { background: #dbeafe; color: #1d4ed8; }
.ct thead th.toggle-active::after { content: ' ✓'; font-size: 11px; }

/* 모달 폼 */
.form-group { margin-bottom: 16px; }
.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 4px;
}
.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-size: 14px;
    background: var(--bg-primary);
    color: var(--text-primary);
    box-sizing: border-box;
}
.form-group textarea { resize: vertical; font-family: inherit; line-height: 1.5; }
.form-hint { display: block; font-size: 12px; color: var(--text-secondary); margin-top: 4px; opacity: 0.7; }
.form-group-inline { display: flex; gap: 16px; }
.form-group-inline .form-group { flex: 1; }
.form-checkbox { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.form-checkbox input[type="checkbox"] { width: 16px; height: 16px; }
.form-checkbox label { font-size: 14px; color: var(--text-primary); margin-bottom: 0; }
</style>
{% endblock %}

{% block admin_content %}
<div>
    <div class="admin-header">
        <div>
            <h1 class="admin-title">수집항목 관리</h1>
            <p class="admin-title-sub">리테일러별 수집 컬럼을 관리합니다</p>
        </div>
    </div>

    <div id="filterBarArea"></div>
    <div id="buttonBarArea"></div>
    <div class="card-section" id="tableArea"></div>
</div>
{% endblock %}

{% block admin_js %}
<script>
// ========== 데이터 ==========
var DATA = [
    {% for row in rows %}
    { id: {{ row.id }}, product_line: '{{ row.product_line|escapejs }}', column_name: '{{ row.column_name|escapejs }}', retailer: '{{ row.retailer|escapejs }}', duplicate_key: {{ row.duplicate_key|yesno:"true,false" }}, skip_missing_check: {{ row.skip_missing_check|yesno:"true,false" }}, is_editable: {{ row.is_editable|yesno:"true,false" }}, related_columns: '{{ row.related_columns|default:""|escapejs }}', is_active: {{ row.is_active|yesno:"true,false" }}, updated_id: '{{ row.updated_id|default:""|escapejs }}', updated_at: '{{ row.updated_at|date:"Y-m-d H:i"|default:""|escapejs }}', memo: '{{ row.memo|default:""|escapejs }}' },
    {% endfor %}
];

// ========== FilterBar ==========
var filterBar = new FilterBar('#filterBarArea', {
    sticky: false,
    controls: [
        { type: 'select', key: 'filterProductLine', options: [
            { value: '', label: '전체 카테고리' },
            { value: 'tv', label: 'TV' },
            { value: 'hhp', label: 'HHP' },
        ] },
        { type: 'select', key: 'filterRetailer', options: [
            { value: '', label: '전체 리테일러' },
            { value: 'amazon', label: 'Amazon' },
            { value: 'bestbuy', label: 'Bestbuy' },
            { value: 'walmart', label: 'Walmart' },
        ] },
        { type: 'select', key: 'filterActive', options: [
            { value: '', label: '전체 상태' },
            { value: 'true', label: '활성' },
            { value: 'false', label: '비활성' },
        ] },
        { type: 'input', key: 'filterSearch', placeholder: '컬럼명 검색',
          onEnter: function() { applyFilter(); } },
    ],
    onSearch: function() { applyFilter(); },
    onReset: function() { applyFilter(); }
}).render();

// ========== ButtonBar ==========
new ButtonBar('#buttonBarArea', {
    align: 'between',
    margin: '0 0 12px 0',
    buttons: [
        { id: 'btnAdd', label: '추가', style: 'save', size: 'fb', padding: '8px 12px', position: 'left', onClick: function() { openAddModal(); } },
        { id: 'btnEdit', label: '수정', style: 'outline', size: 'fb', padding: '8px 12px', position: 'left', onClick: function() { editSelected(); } },
        { id: 'btnDelete', label: '삭제', style: 'danger', size: 'fb', padding: '8px 12px', position: 'right', onClick: function() { deleteSelected(); } },
    ]
}).render();

// ========== CommonTable ==========
var table = new CommonTable('#tableArea', {
    variant: 'grid',
    columns: [
        { key: '_chk', label: '', width: 40, align: 'center' },
        { key: '_no', label: 'No', width: 50, align: 'center' },
        { key: 'product_line', label: '카테고리', width: 70, sortable: true, align: 'center' },
        { key: 'retailer', label: '리테일러', width: 90, sortable: true, align: 'center' },
        { key: 'column_name', label: '컬럼명', width: 180, sortable: true },
        { key: 'duplicate_key', label: '중복키', width: 60, align: 'center' },
        { key: 'skip_missing_check', label: '누락스킵', width: 70, align: 'center' },
        { key: 'is_editable', label: '수정가능', width: 70, align: 'center' },
        { key: 'is_active', label: '상태', width: 55, align: 'center' },
    ],
    showTotalCount: true,
    onSort: function(key, order) { handleSort(key, order); }
});
table.render();

// 헤더 체크박스
(function() {
    var ths = table.getTable().querySelectorAll('thead th');
    ths[0].innerHTML = '<input type="checkbox" id="checkAll">';
    if (table.countEl) table.countEl.style.borderTop = '1px solid var(--border-color)';
})();

// ========== 헤더 토글 필터 ==========
var headerToggle = { duplicate_key: false, skip_missing_check: false, is_editable: false };
var toggleColMap = { duplicate_key: 5, skip_missing_check: 6, is_editable: 7 };
var toggleDataMap = { duplicate_key: 'dup', skip_missing_check: 'skip', is_editable: 'edit' };

(function() {
    var ths = table.getTable().querySelectorAll('thead th');
    Object.keys(toggleColMap).forEach(function(key) {
        var th = ths[toggleColMap[key]];
        th.classList.add('toggle-filter');
        th.title = '클릭하면 Y만 필터';
        th.addEventListener('click', function() {
            headerToggle[key] = !headerToggle[key];
            th.classList.toggle('toggle-active', headerToggle[key]);
            th.title = headerToggle[key] ? '클릭하면 필터 해제' : '클릭하면 Y만 필터';
            applyFilter();
        });
    });
})();

// ========== 행 렌더링 ==========
function renderRow(item, idx) {
    return '<tr' + (item.is_active ? '' : ' class="inactive"') + ' style="cursor:pointer" ' +
        'ondblclick="editById(' + item.id + ')" ' +
        'data-id="' + item.id + '" ' +
        'data-product-line="' + esc(item.product_line) + '" ' +
        'data-column-name="' + esc(item.column_name) + '" ' +
        'data-retailer="' + esc(item.retailer) + '" ' +
        'data-related-columns="' + esc(item.related_columns) + '" ' +
        'data-active="' + item.is_active + '" ' +
        'data-dup="' + item.duplicate_key + '" ' +
        'data-skip="' + item.skip_missing_check + '" ' +
        'data-edit="' + item.is_editable + '">' +
        '<td class="ct-nc" style="text-align:center"><input type="checkbox" class="row-check" value="' + item.id + '"></td>' +
        '<td class="col-no" style="text-align:center"></td>' +
        '<td style="text-align:center">' + esc(item.product_line).toUpperCase() + '</td>' +
        '<td style="text-align:center">' + esc(item.retailer) + '</td>' +
        '<td><strong>' + esc(item.column_name) + '</strong></td>' +
        '<td class="ct-nc" style="text-align:center">' + (item.duplicate_key ? 'Y' : '') + '</td>' +
        '<td class="ct-nc" style="text-align:center">' + (item.skip_missing_check ? 'Y' : '') + '</td>' +
        '<td class="ct-nc" style="text-align:center">' + (item.is_editable ? 'Y' : '') + '</td>' +
        '<td class="ct-nc" style="text-align:center"><span class="status-dot ' + (item.is_active ? 'active' : 'inactive') + '" onclick="event.stopPropagation(); toggleColumn(' + item.id + ')"></span></td>' +
        '</tr>';
}

table.renderBody(DATA, renderRow);

// ========== 정렬 ==========
function handleSort(key, order) {
    DATA.sort(function(a, b) {
        var va = String(a[key] || '').toLowerCase();
        var vb = String(b[key] || '').toLowerCase();
        if (va < vb) return order === 'asc' ? -1 : 1;
        if (va > vb) return order === 'asc' ? 1 : -1;
        return 0;
    });
    table.renderBody(DATA, renderRow);
    _applyFilter();
    updateTotalCount();
    if (pager) pager.reset();
}

// ========== 필터 ==========
function saveFilterState() {
    var params = new URLSearchParams();
    var pl = filterBar.getValue('filterProductLine');
    var ret = filterBar.getValue('filterRetailer');
    var act = filterBar.getValue('filterActive');
    var search = filterBar.getValue('filterSearch');
    if (pl) params.set('pl', pl);
    if (ret) params.set('ret', ret);
    if (act) params.set('act', act);
    if (search) params.set('q', search);
    if (pager && pager.getCurrentPage() > 1) params.set('pg', pager.getCurrentPage());
    sessionStorage.setItem('rc_filter', params.toString());
}

function _applyFilter() {
    var pl = filterBar.getValue('filterProductLine');
    var ret = filterBar.getValue('filterRetailer');
    var act = filterBar.getValue('filterActive');
    var search = (filterBar.getValue('filterSearch') || '').toLowerCase();
    var tbody = table.getTable().querySelector('tbody');

    tbody.querySelectorAll('tr').forEach(function(row) {
        var show = true;
        if (pl && row.dataset.productLine !== pl) show = false;
        if (ret && row.dataset.retailer !== ret) show = false;
        if (act === 'true' && row.dataset.active !== 'true') show = false;
        if (act === 'false' && row.dataset.active !== 'false') show = false;
        if (search) {
            show = show && (row.dataset.columnName || '').toLowerCase().includes(search);
        }
        if (headerToggle.duplicate_key && row.dataset.dup !== 'true') show = false;
        if (headerToggle.skip_missing_check && row.dataset.skip !== 'true') show = false;
        if (headerToggle.is_editable && row.dataset.edit !== 'true') show = false;
        if (show) row.removeAttribute('data-filtered');
        else row.setAttribute('data-filtered', 'hidden');
    });
    document.getElementById('checkAll').checked = false;
    tbody.querySelectorAll('.row-check').forEach(function(cb) { cb.checked = false; });
    saveFilterState();
}

function applyFilter() {
    _applyFilter();
    updateTotalCount();
    if (pager) pager.reset();
}

function updateTotalCount() {
    var el = table.countEl;
    if (!el) return;
    var tbody = table.getTable().querySelector('tbody');
    var filtered = Array.from(tbody.querySelectorAll('tr')).filter(function(r) {
        return r.getAttribute('data-filtered') !== 'hidden';
    }).length;
    var total = DATA.length;
    if (filtered === total) {
        el.innerHTML = '총 <strong>' + total + '</strong>건';
    } else {
        el.innerHTML = '총 <strong>' + total + '</strong>건 (필터 적용: <strong>' + filtered + '</strong>건)';
    }
}

// ========== 체크박스 ==========
document.getElementById('checkAll').addEventListener('change', function() {
    var checked = this.checked;
    var tbody = table.getTable().querySelector('tbody');
    tbody.querySelectorAll('tr:not([data-filtered]) .row-check').forEach(function(cb) { cb.checked = checked; });
});

function getSelectedRows() {
    var rows = [];
    table.getTable().querySelectorAll('tbody .row-check:checked').forEach(function(cb) { rows.push(cb.closest('tr')); });
    return rows;
}

// ========== CRUD ==========
function editById(id) {
    var item = DATA.find(function(d) { return d.id === id; });
    if (item) openEditModal(item);
}

function editSelected() {
    var rows = getSelectedRows();
    if (rows.length === 0) { showToast('수정할 항목을 선택하세요.', 'warn'); return; }
    if (rows.length > 1) { showToast('수정은 1개 항목만 선택하세요.', 'warn'); return; }
    editById(parseInt(rows[0].dataset.id));
}

function deleteSelected() {
    var rows = getSelectedRows();
    if (rows.length === 0) { showToast('삭제할 항목을 선택하세요.', 'warn'); return; }
    var ids = rows.map(function(r) { return r.dataset.id; });
    showConfirm(ids.length + '개 항목을 삭제하시겠습니까?').then(function(ok) {
        if (!ok) return;
        var promises = ids.map(function(id) {
            return fetch('/accounts/admin/retail-columns/' + id + '/delete/', {
                method: 'POST',
                headers: { 'X-CSRFToken': getCsrfToken(), 'Content-Type': 'application/json' }
            }).then(function(r) { return r.json(); });
        });
        Promise.all(promises).then(function(results) {
            var failed = results.filter(function(r) { return !r.success; });
            if (failed.length > 0) showToast(failed.length + '개 삭제 실패', 'error');
            reloadWithFilter();
        });
    });
}

function toggleColumn(id) {
    showConfirm('상태를 변경하시겠습니까?').then(function(ok) {
        if (!ok) return;
        fetch('/accounts/admin/retail-columns/' + id + '/toggle/', {
            method: 'POST',
            headers: { 'X-CSRFToken': getCsrfToken(), 'Content-Type': 'application/json' }
        })
        .then(function(r) { return r.json(); })
        .then(function(res) {
            if (res.success) reloadWithFilter();
            else showToast(res.error, 'error');
        });
    });
}

function reloadWithFilter() {
    var params = new URLSearchParams();
    var pl = filterBar.getValue('filterProductLine');
    var ret = filterBar.getValue('filterRetailer');
    var act = filterBar.getValue('filterActive');
    var search = filterBar.getValue('filterSearch');
    if (pl) params.set('pl', pl);
    if (ret) params.set('ret', ret);
    if (act) params.set('act', act);
    if (search) params.set('q', search);
    var qs = params.toString();
    location.href = location.pathname + (qs ? '?' + qs : '');
}

// ========== 모달 (AppModal) ==========
var MODAL_ID = 'rc-form';
AppModal.create(MODAL_ID, { style: 'form', closeOnOverlay: true });

var _editId = null;
var _originalData = null;

function getModalBody() {
    return '<div class="form-group-inline">' +
        '<div class="form-group"><label>카테고리 *</label>' +
        '<select id="formProductLine"><option value="tv">TV</option><option value="hhp">HHP</option></select></div>' +
        '<div class="form-group"><label>리테일러 *</label>' +
        '<select id="formRetailer"><option value="amazon">Amazon</option><option value="bestbuy">Bestbuy</option><option value="walmart">Walmart</option></select></div>' +
        '</div>' +
        '<div class="form-group"><label>컬럼명 *</label>' +
        '<input type="text" id="formColumnName" placeholder="예: screen_size"></div>' +
        '<div class="form-group"><label>조회용 컬럼</label>' +
        '<input type="text" id="formRelatedColumns" placeholder="예: retailer_sku_name|screen_size">' +
        '<span class="form-hint">여러 컬럼은 | 로 구분하여 입력하세요</span></div>' +
        '<div class="form-group"><label>메모</label>' +
        '<textarea id="formMemo" rows="3" placeholder="메모를 입력하세요"></textarea></div>' +
        '<div class="form-checkbox"><input type="checkbox" id="formDuplicateKey"><label for="formDuplicateKey">중복검증 키</label></div>' +
        '<div class="form-checkbox"><input type="checkbox" id="formSkipMissing"><label for="formSkipMissing">누락검사 스킵</label></div>' +
        '<div class="form-checkbox"><input type="checkbox" id="formIsEditable"><label for="formIsEditable">수정 가능</label></div>' +
        '<div class="form-checkbox"><input type="checkbox" id="formIsActive" checked><label for="formIsActive">활성</label></div>' +
        '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border-color)">' +
        '<button type="button" class="fb-btn fb-btn--outline" onclick="AppModal.close(\'' + MODAL_ID + '\')">취소</button>' +
        '<button type="button" class="fb-btn fb-btn--save" onclick="saveColumn()">저장</button>' +
        '</div>';
}

function openAddModal() {
    _editId = null;
    _originalData = null;
    AppModal.setTitle(MODAL_ID, '항목 추가');
    AppModal.setBody(MODAL_ID, getModalBody());
    AppModal.open(MODAL_ID);
}

function openEditModal(item) {
    _editId = item.id;
    _originalData = {
        product_line: item.product_line,
        column_name: item.column_name,
        retailer: item.retailer,
        duplicate_key: item.duplicate_key,
        skip_missing_check: item.skip_missing_check,
        is_editable: item.is_editable,
        related_columns: item.related_columns || '',
        memo: item.memo || '',
        is_active: item.is_active,
    };
    AppModal.setTitle(MODAL_ID, '항목 수정');
    AppModal.setBody(MODAL_ID, getModalBody());
    // 폼 값 채우기
    document.getElementById('formProductLine').value = item.product_line;
    document.getElementById('formRetailer').value = item.retailer;
    document.getElementById('formColumnName').value = item.column_name;
    document.getElementById('formRelatedColumns').value = item.related_columns || '';
    document.getElementById('formMemo').value = item.memo || '';
    document.getElementById('formDuplicateKey').checked = item.duplicate_key;
    document.getElementById('formSkipMissing').checked = item.skip_missing_check;
    document.getElementById('formIsEditable').checked = item.is_editable;
    document.getElementById('formIsActive').checked = item.is_active;
    AppModal.open(MODAL_ID);
}

function saveColumn() {
    var data = {
        product_line: document.getElementById('formProductLine').value,
        column_name: document.getElementById('formColumnName').value.trim(),
        retailer: document.getElementById('formRetailer').value,
        duplicate_key: document.getElementById('formDuplicateKey').checked,
        skip_missing_check: document.getElementById('formSkipMissing').checked,
        is_editable: document.getElementById('formIsEditable').checked,
        related_columns: document.getElementById('formRelatedColumns').value.trim(),
        memo: document.getElementById('formMemo').value.trim(),
        is_active: document.getElementById('formIsActive').checked,
    };

    if (!data.column_name) {
        showToast('컬럼명을 입력하세요.', 'warn');
        return;
    }

    if (_editId && _originalData) {
        var hasChange = Object.keys(data).some(function(k) {
            if (typeof data[k] === 'boolean') return data[k] !== _originalData[k];
            return (data[k] || '') !== (_originalData[k] || '');
        });
        if (!hasChange) {
            showToast('변경된 데이터가 없습니다.', 'info');
            return;
        }
    }

    var url = _editId
        ? '/accounts/admin/retail-columns/' + _editId + '/update/'
        : '/accounts/admin/retail-columns/create/';

    fetch(url, {
        method: 'POST',
        headers: { 'X-CSRFToken': getCsrfToken(), 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(function(r) {
        if (!r.ok) return r.text().then(function(t) { throw new Error('서버 ' + r.status + ': ' + t.substring(0, 200)); });
        return r.json();
    })
    .then(function(res) {
        if (res.success) {
            AppModal.close(MODAL_ID);
            reloadWithFilter();
        } else {
            showToast(res.error || '오류가 발생했습니다.', 'error');
        }
    })
    .catch(function(err) { showToast('요청 오류: ' + err.message, 'error'); });
}

// ========== 필터 복원 ==========
(function() {
    var params = new URLSearchParams(location.search);
    if (!params.toString()) {
        var saved = sessionStorage.getItem('rc_filter');
        if (saved) params = new URLSearchParams(saved);
    }
    if (!params.toString()) {
        return;
    }
    if (params.get('pl')) filterBar.setValue('filterProductLine', params.get('pl'));
    if (params.get('ret')) filterBar.setValue('filterRetailer', params.get('ret'));
    if (params.get('act')) filterBar.setValue('filterActive', params.get('act'));
    if (params.get('q')) filterBar.setValue('filterSearch', params.get('q'));
    window._restorePage = parseInt(params.get('pg')) || 0;
})();

// ========== 페이지네이션 ==========
var pager = enablePagination(table.getTable().querySelector('tbody'), {
    perPage: 25,
    showInfo: false,
    deferRender: true,
    onRender: function(visibleRows, start) {
        visibleRows.forEach(function(row, i) {
            var noCell = row.querySelector('.col-no');
            if (noCell) noCell.textContent = start + i + 1;
        });
    }
});

// 초기 필터 적용 + 페이지네이션 시작
applyFilter();
if (window._restorePage > 1) pager.goTo(window._restorePage);

enableColumnResize('#tableArea .ct');
</script>
{% endblock %}
