{% extends "base.html" %}

{% block title %}접근 권한 없음{% endblock %}

{% block content %}
<div class="access-denied-container">
    <div class="access-denied-card">
        <div class="access-denied-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
            </svg>
        </div>
        <h1>접근 권한이 없습니다</h1>
        <p class="message">{{ message }}</p>
        <p class="info">
            이 페이지에 접근하려면 <strong>{{ required_permission }}</strong> 권한이 필요합니다.<br>
            관리자에게 문의하여 권한을 요청하세요.
        </p>
        <div class="actions">
            <a href="/" class="btn btn-primary">홈으로 돌아가기</a>
            <a href="javascript:history.back()" class="btn btn-secondary">이전 페이지</a>
        </div>
    </div>
</div>

<style>
.access-denied-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
}

.access-denied-card {
    background: var(--bg-secondary);
    border-radius: 16px;
    padding: 48px;
    text-align: center;
    max-width: 500px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
}

.access-denied-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    color: var(--color-critical);
}

.access-denied-icon svg {
    width: 100%;
    height: 100%;
}

.access-denied-card h1 {
    font-size: 24px;
    color: var(--text-primary);
    margin-bottom: 16px;
}

.access-denied-card .message {
    font-size: 16px;
    color: var(--color-critical);
    margin-bottom: 16px;
    font-weight: 500;
}

.access-denied-card .info {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 32px;
    line-height: 1.6;
}

.access-denied-card .info strong {
    color: var(--text-primary);
}

.actions {
    display: flex;
    gap: 12px;
    justify-content: center;
}

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
    cursor: pointer;
    border: none;
}

.btn-primary {
    background: var(--color-layer1);
    color: white;
}

.btn-primary:hover {
    background: #152a4d;
}

.btn-secondary {
    background: var(--bg-primary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
}

.btn-secondary:hover {
    background: var(--border-color);
}
</style>
{% endblock %}
