{% extends 'layer4/base_layer4.html' %}
{% load static %}

{% block page_title %}보고서{% endblock %}

{% block layer4_content %}
<!-- 보고서 컨트롤 -->
<div class="l4-report-controls" style="display: flex; justify-content: flex-end;">
    <button class="app-btn app-btn-sm app-btn-save" id="saveReportBtn" onclick="saveReportToDocument()">💾 보고서 저장</button>
</div>

<!-- 보고서 영역 -->
<div class="l4-report-area">
    <div id="report-detail" class="l4-report-content">
        <div class="l4-empty-state">
            <p>날짜를 선택하고 조회 버튼을 클릭하세요.</p>
        </div>
    </div>
</div>
{% endblock %}

{% block layer4_js %}
<script src="{% static 'js/dx/dx_layer4/common.js' %}?v=1"></script>
<script src="{% static 'js/dx/dx_layer4/report.js' %}?v=1"></script>
{% endblock %}
