{% extends 'base_layer3.html' %}
{% load static %}

{% block page_title %}대시보드{% endblock %}

{% block layer3_content %}
<!-- Summary Cards -->
<div class="stats-grid" id="summary-cards">
    <div class="stat-card">
        <div class="label">검사 건수</div>
        <div class="value" id="total-checked">-</div>
    </div>
    <div class="stat-card">
        <div class="label">정상</div>
        <div class="value" id="total-passed" style="color: var(--color-ok);">-</div>
    </div>
    <div class="stat-card">
        <div class="label">이상치</div>
        <div class="value" id="total-failed" style="color: var(--color-critical);">-</div>
    </div>
    <div class="stat-card">
        <div class="label">통과율</div>
        <div class="value" id="pass-rate">-</div>
    </div>
</div>

<!-- 필드 누락 탐지 섹션 -->
<div class="category-section" id="field-missing-section">
    <div class="category-header" onclick="toggleFieldMissing()">
        <div class="category-title">
            <div class="category-icon" style="background: #fef3c7; color: #d97706;">🔍</div>
            <span>필드 누락 탐지 (직전 2일 비교)</span>
            <span class="toggle-icon" id="field-missing-toggle">▶</span>
        </div>
        <div class="category-summary">
            <div class="category-stat">
                <div class="value" id="field-missing-total">-</div>
                <div class="label">누락 케이스</div>
            </div>
            <div class="category-stat">
                <div class="value" id="field-missing-fields">-</div>
                <div class="label">문제 필드</div>
            </div>
            <span class="status-badge" id="field-missing-status">-</span>
        </div>
    </div>
    <div class="category-content" id="field-missing-content">
        <!-- TV / HHP 탭 -->
        <div class="field-missing-tabs">
            <button class="field-missing-tab active" data-pl="tv" onclick="switchFieldMissingTab('tv')">TV</button>
        </div>
        <!-- 리테일러 카드들 -->
        <div class="field-missing-retailers" id="field-missing-retailers">
            <div class="field-missing-retailer-card" data-retailer="Amazon">
                <div class="retailer-card-header">
                    <span class="retailer-name" id="retailer-name-Amazon">TV_Amazon</span>
                    <span class="retailer-badge" id="badge-tv-Amazon">-</span>
                </div>
                <div class="retailer-card-actions">
                    <button class="btn-view-summary" onclick="viewMissingSummary('Amazon')">누락분 보기</button>
                    <button class="btn-view-3days" onclick="view3DaysData('Amazon')">3일치 보기</button>
                </div>
            </div>
            <div class="field-missing-retailer-card" data-retailer="Bestbuy">
                <div class="retailer-card-header">
                    <span class="retailer-name" id="retailer-name-Bestbuy">TV_Bestbuy</span>
                    <span class="retailer-badge" id="badge-tv-Bestbuy">-</span>
                </div>
                <div class="retailer-card-actions">
                    <button class="btn-view-summary" onclick="viewMissingSummary('Bestbuy')">누락분 보기</button>
                    <button class="btn-view-3days" onclick="view3DaysData('Bestbuy')">3일치 보기</button>
                </div>
            </div>
            <div class="field-missing-retailer-card" data-retailer="Walmart">
                <div class="retailer-card-header">
                    <span class="retailer-name" id="retailer-name-Walmart">TV_Walmart</span>
                    <span class="retailer-badge" id="badge-tv-Walmart">-</span>
                </div>
                <div class="retailer-card-actions">
                    <button class="btn-view-summary" onclick="viewMissingSummary('Walmart')">누락분 보기</button>
                    <button class="btn-view-3days" onclick="view3DaysData('Walmart')">3일치 보기</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Category Sections Container -->
<div id="categories-container">
    <div class="loading">데이터를 불러오는 중...</div>
</div>

{% endblock %}

{% block layer3_js %}
<script src="{% static 'dx_layer3/js/common.js' %}?v=1"></script>
<script src="{% static 'dx_layer3/js/time-series.js' %}"></script>
<script src="{% static 'dx_layer3/js/cross-field.js' %}?v=1"></script>
<script src="{% static 'dx_layer3/js/category-spec.js' %}?v=1"></script>
<script src="{% static 'dx_layer3/js/field-missing.js' %}?v=2"></script>
{% endblock %}
