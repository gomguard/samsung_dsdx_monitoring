{% extends 'base_layer1.html' %}
{% load static %}

{% block page_title %}대시보드{% endblock %}

{% block layer1_content %}
<!-- Stats Grid -->
<div class="stats-grid" id="stats-grid">
    <div class="stat-card">
        <div class="label">총 검증 항목</div>
        <div class="value" id="total-checked">-</div>
    </div>
    <div class="stat-card">
        <div class="label">정상</div>
        <div class="value" id="total-passed" style="color: var(--color-ok);">-</div>
    </div>
    <div class="stat-card">
        <div class="label">실패</div>
        <div class="value" id="total-failed" style="color: var(--color-critical);">-</div>
    </div>
    <div class="stat-card">
        <div class="label">확인된 섹션</div>
        <div class="value" id="total-confirmed">-</div>
    </div>
</div>

<!-- Daily Checks Section -->
<div class="checks-section">
    <div class="checks-header">데일리 검증 항목</div>
    <div id="daily-checks-list">
        <div class="check-item">
            <div class="check-main">
                <div class="check-info">
                    <div class="check-name">로딩 중...</div>
                    <div class="check-description">데이터를 불러오고 있습니다</div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Period Checks Section -->
<div class="checks-section">
    <div class="checks-header">분석대상일별 검증 항목</div>
    <div id="period-checks-list">
        <div class="check-item">
            <div class="check-main">
                <div class="check-info">
                    <div class="check-name">로딩 중...</div>
                    <div class="check-description">데이터를 불러오고 있습니다</div>
                </div>
            </div>
        </div>
    </div>
</div>


<!-- 모달은 AppModal로 동적 생성 -->

{% endblock %}

{% block layer1_js %}
<script src="{% static 'dx_layer1/js/retail.js' %}?v=4"></script>
<script src="{% static 'dx_layer1/js/sentiment.js' %}?v=2"></script>
<script src="{% static 'dx_layer1/js/youtube.js' %}?v=2"></script>
<script src="{% static 'dx_layer1/js/market_trend.js' %}?v=2"></script>
<script src="{% static 'dx_layer1/js/market_demand.js' %}?v=2"></script>
<script src="{% static 'dx_layer1/js/market_competitor.js' %}?v=2"></script>
<script src="{% static 'dx_layer1/js/market_competitor_event.js' %}?v=2"></script>
<script src="{% static 'dx_layer1/js/market_promotion.js' %}?v=2"></script>
<script src="{% static 'dx_layer1/js/macro.js' %}?v=2"></script>
<script src="{% static 'dx_layer1/js/dashboard.js' %}?v=2"></script>
{% endblock %}
