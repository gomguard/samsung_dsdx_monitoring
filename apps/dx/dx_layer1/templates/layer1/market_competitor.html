{% extends 'layer1/base_layer1.html' %}
{% block page_title %}Market Competitor{% endblock %}

{% block layer1_content %}
<div class="checks-section" id="summary-view">
    <div id="section-content">
        <div class="check-item">
            <div class="check-main"><div class="check-info"><div class="check-name">로딩 중...</div></div></div>
        </div>
    </div>
</div>

{% include 'layer1/includes/_raw_data_view.html' with back_url='/dx/layer1/market-competitor/' %}
{% endblock %}

{% block layer1_js %}
<script>
function renderMarketCompetitorCheck(check, checkIdx) {
    const hasCategories = check.categories && check.categories.length > 0;
    const statusClass = getStatusClass(check.status);
    const isTargetDate = check.is_target_date;
    const isDst = check.is_dst || false;
    const kstLabel = isDst ? 'KST(DST)' : 'KST';

    // 분기 정보
    const quarterStart = check.quarter?.start || '';
    const quarterEnd = check.quarter?.end || '';
    const nextQuarterStart = check.quarter?.next_start || '';
    const quarterDisplay = quarterStart && quarterEnd
        ? `이번분기 대상(${quarterStart} ~ ${quarterEnd})`
        : '';

    // 수집 시간 정보
    const usTime = check.us_time ? check.us_time.split(' ')[1] : '';
    const krTime = check.kr_time || '';

    // 마지막 실행 시간 포맷팅
    let lastRunDisplay = '';
    if (check.last_run) {
        const lastRunDate = new Date(check.last_run);
        lastRunDisplay = lastRunDate.toLocaleString('ko-KR', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    // 스케줄 헤더 (한 섹션에 통합)
    let scheduleHeader = '';
    if (isTargetDate && usTime) {
        // 분석대상일: 수집 시간 + 분기 정보
        scheduleHeader = `
            <div class="time-slot-item" style="margin-bottom: 16px;">
                <div class="time-slot-header" style="cursor: default;">
                    <div class="time-slot-info">
                        <span class="time-slot-name">수집 시간</span>
                        <span class="time-slot-time">
                            <span class="utc">US(NY) ${usTime}</span>
                            <span class="kst">${kstLabel} ${krTime}</span>
                        </span>
                        <span style="margin-left: 12px; font-size: 12px; color: var(--text-secondary);">${quarterDisplay}</span>
                    </div>
                </div>
            </div>
        `;
    } else {
        // 분석대상일 아님: 다음 분석일 + 분기 정보
        scheduleHeader = `
            <div class="time-slot-item" style="margin-bottom: 16px;">
                <div class="time-slot-header" style="cursor: default;">
                    <div class="time-slot-info">
                        <span class="time-slot-name">다음 분석일</span>
                        <span class="time-slot-time">
                            <span class="kst">${nextQuarterStart}</span>
                        </span>
                        <span style="margin-left: 12px; font-size: 12px; color: var(--text-secondary);">${quarterDisplay}</span>
                    </div>
                </div>
            </div>
        `;
    }

    // TV, HHP 순서로 정렬
    const sortOrder = ['TV', 'HHP'];
    const sortedCategories = hasCategories ? [...check.categories].sort((a, b) => {
        const aIdx = sortOrder.indexOf(a.category);
        const bIdx = sortOrder.indexOf(b.category);
        if (aIdx === -1 && bIdx === -1) return 0;
        if (aIdx === -1) return 1;
        if (bIdx === -1) return -1;
        return aIdx - bIdx;
    }) : [];

    // 키워드 커버리지 정보
    const kwCoverage = check.keyword_coverage || {};
    const kwComboRate = kwCoverage.total_combo_rate || 100;
    const kwMissing = kwCoverage.total_missing || 0;
    const kwStatusClass = getStatusClass(check.status);

    let categoriesHtml = '';
    if (hasCategories) {
        categoriesHtml = `
            <div class="time-slots-container" id="time-slots-${checkIdx}">
                ${scheduleHeader}
                <div class="sentiment-two-column show no-side-padding">
                    ${sortedCategories.map(cat => {
                        const catKw = cat.keyword_coverage || {};
                        const kwStatus = catKw.combo_rate >= 100 ? 'OK' : 'CRITICAL';
                        const statusBadgeHtml = isTargetDate || check.batch_id ? getStatusBadge(kwStatus) : '<span class="status-badge pending"><span class="status-dot"></span>분석대상일 아님</span>';
                        return `
                            <div class="sentiment-column">
                                <div class="sentiment-column-header">
                                    <span class="sentiment-column-title">${cat.category}</span>
                                    <div class="sentiment-column-stats">
                                        ${statusBadgeHtml}
                                    </div>
                                </div>
                                <div class="sentiment-retailer-list">
                                    <a class="sentiment-retailer-item ${getStatusClass(kwStatus)}" href="/dx/layer1/market-competitor/?category=${encodeURIComponent(cat.category)}&view=keywords&date=${getSelectedDate()}" style="text-decoration: none; color: inherit; cursor: pointer;">
                                        <span class="sentiment-retailer-name">키워드</span>
                                        <div class="sentiment-retailer-stats">
                                            <span class="sentiment-retailer-count">${catKw.combo_collected || 0}/${catKw.combo_expected || 0}</span>
                                            <span class="sentiment-retailer-rate ${getStatusClass(kwStatus)}">${catKw.combo_rate || 100}%</span>
                                            ${getStatusBadge(kwStatus)}
                                        </div>
                                    </a>
                                    <a class="sentiment-retailer-item ${getStatusClass(kwStatus)}" href="/dx/layer1/market-competitor/?category=${encodeURIComponent(cat.category)}&date=${getSelectedDate()}" style="text-decoration: none; color: inherit; cursor: pointer;">
                                        <span class="sentiment-retailer-name">수집량</span>
                                        <div class="sentiment-retailer-stats">
                                            <span class="sentiment-retailer-count large">${cat.collected.toLocaleString()}</span>
                                        </div>
                                    </a>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
                ${check.batch_id ? `
                    <div style="padding: 8px 16px; font-size: 12px; color: var(--color-text-muted); border-top: 1px solid var(--color-border);">
                        배치: ${check.batch_id} | 마지막 실행: ${lastRunDisplay || 'N/A'}
                    </div>
                ` : ''}
            </div>
        `;
    } else {
        // 카테고리가 없을 때 - 기본 카테고리(TV, HHP)를 표시
        const defaultCategories = ['TV', 'HHP'];
        categoriesHtml = `
            <div class="time-slots-container" id="time-slots-${checkIdx}">
                ${scheduleHeader}
                <div class="sentiment-two-column show no-side-padding">
                    ${defaultCategories.map(catName => {
                        return `
                            <div class="sentiment-column">
                                <div class="sentiment-column-header">
                                    <span class="sentiment-column-title">${catName}</span>
                                    <div class="sentiment-column-stats">
                                        <span class="status-badge pending"><span class="status-dot"></span>분석대상일 아님</span>
                                    </div>
                                </div>
                                <div class="sentiment-retailer-list">
                                    <div class="sentiment-retailer-item pending">
                                        <span class="sentiment-retailer-name">키워드</span>
                                        <div class="sentiment-retailer-stats">
                                            <span class="sentiment-retailer-count">0/0</span>
                                            <span class="sentiment-retailer-rate pending">0%</span>
                                            <span class="status-badge pending"><span class="status-dot"></span>대기중</span>
                                        </div>
                                    </div>
                                    <div class="sentiment-retailer-item pending">
                                        <span class="sentiment-retailer-name">수집량</span>
                                        <div class="sentiment-retailer-stats">
                                            <span class="sentiment-retailer-count large">0</span>
                                            <span class="status-badge pending"><span class="status-dot"></span>대기중</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `;
    }

    // 분석률 또는 분석대상일 아님 표시 - 키워드 기준 (100% 아니면 심각)
    const statsHtml = isTargetDate
        ? `
            <div class="check-stat">
                <div class="value ${kwComboRate >= 100 ? 'ok' : 'critical'}">${kwComboRate}%</div>
                <div class="label">키워드</div>
            </div>
            ${getStatusBadge(kwComboRate >= 100 ? 'OK' : 'CRITICAL')}
        `
        : `
            <span class="status-badge pending">
                <span class="status-dot"></span>
                분석대상일 아님
            </span>
        `;

    return `
        <div class="check-item">
            <div class="check-main" onclick="toggleTimeSlots(this, ${checkIdx})">
                <div class="check-info">
                    <div class="check-name">
                        <span class="toggle-icon">▶</span>
                        ${esc(check.name)}
                    </div>
                    <div class="check-description">${esc(check.description)}</div>
                </div>
                <div class="check-criteria">
                    <span class="criteria-item ok">정상: 100%</span>
                    <span class="criteria-item critical">심각: 100% 미만</span>
                </div>
                <div class="check-stats">
                    ${statsHtml}
                </div>
            </div>
            ${categoriesHtml}
        </div>
    `;
}

// ============================================================
// Raw Data View
// ============================================================
var rawView = new RawDataView({
    apiUrl: '/dx/layer1/api/market-competitor-raw-data/',
    backUrl: '/dx/layer1/market-competitor/',
    title: function(p) { return 'Market Competitor 수집 데이터 - ' + p.category; },
    urlParams: ['category'],
    onInit: function(params) {
        if (params.get('view') === 'keywords' && params.get('category')) {
            showKeywordsView(params.get('category'));
            return true;
        }
        return false;
    }
});

function showKeywordsView(category) {
    document.getElementById('filter-bar-container').style.display = 'none';
    document.getElementById('summary-view').style.display = 'none';
    document.getElementById('raw-data-view').style.display = '';

    document.getElementById('raw-data-title').textContent = 'Market Competitor 키워드 등록 현황 - ' + category;

    var countEl = document.getElementById('rawDataCount');
    var wrapperEl = document.getElementById('rawDataTableWrapper');
    wrapperEl.innerHTML = '<div class="raw-data-loading"><div class="raw-data-loading-spinner"></div>데이터를 불러오는 중...</div>';
    document.getElementById('rawDataPagination').innerHTML = '';
    document.getElementById('raw-data-filter-bar').innerHTML = '';

    var allRows = [];
    var displayRows = [];
    var kwFilterBar = null;
    var kwTable = null;
    // colIdx → data array index 매핑: key 1=product_line, 2=content_type, 3=keyword, 4=is_active, 5=created_at
    var colKeyToIdx = { 'product_line': 1, 'content_type': 2, 'keyword': 3, 'is_active': 4, 'created_at': 5 };

    var url = '/dx/layer1/api/market-competitor-keywords/?category=' + encodeURIComponent(category);

    fetch(url)
        .then(function(response) { return response.json(); })
        .then(function(data) {
            if (data.error) {
                wrapperEl.innerHTML = '<div class="raw-data-empty">오류: ' + esc(data.error) + '</div>';
                return;
            }

            allRows = data.data || [];
            displayRows = allRows.slice();
            countEl.innerHTML = '총 <strong>' + (data.total_count || 0).toLocaleString() + '</strong>건';

            if (allRows.length === 0) {
                wrapperEl.innerHTML = '<div class="raw-data-empty">등록된 키워드가 없습니다</div>';
                initKwFilterBar([]);
                return;
            }

            initKwFilterBar(['카테고리', '유형', '키워드', '활성', '등록일']);
            initKwTable();
            renderKwBody(displayRows);
        })
        .catch(function(error) {
            wrapperEl.innerHTML = '<div class="raw-data-empty">데이터를 불러오는데 실패했습니다.</div>';
            console.error('Error:', error);
        });

    function initKwFilterBar(columnLabels) {
        var controls = [
            { type: 'custom', html: '<span style="font-size: 16px; font-weight: 600; color: var(--page-color); white-space: nowrap; padding-right: 10px; margin-right: 2px; border-right: 2px solid var(--text-secondary);">' + esc(getSelectedDate()) + '</span>' }
        ];
        if (columnLabels.length > 0) {
            controls.push({
                type: 'select', key: 'filterCol', label: '항목', width: 'auto',
                options: columnLabels.map(function(col, i) { return { value: String(i + 1), label: col }; })
            });
            controls.push({
                type: 'input', key: 'filterVal', label: '검색어', placeholder: '값 입력...',
                onEnter: function() { applyKwFilter(); }
            });
        }
        kwFilterBar = new FilterBar('#raw-data-filter-bar', {
            sticky: true,
            controls: controls,
            onSearch: columnLabels.length > 0 ? function() { applyKwFilter(); } : undefined,
            onReset: columnLabels.length > 0 ? function() {
                kwFilterBar.setValue('filterVal', '');
                displayRows = allRows.slice();
                renderKwBody(displayRows);
                countEl.innerHTML = '총 <strong>' + allRows.length.toLocaleString() + '</strong>건';
                if (kwTable) kwTable.setSort(null, null);
            } : undefined,
            right: columnLabels.length > 0 ? [
                { type: 'button', label: '정렬 초기화', style: 'outline', size: 'fb', onClick: function() {
                    displayRows = allRows.slice();
                    if (kwTable) kwTable.setSort(null, null);
                    applyKwFilter();
                }}
            ] : []
        }).render();
    }

    function applyKwFilter() {
        if (!kwFilterBar) return;
        var colIdx = parseInt(kwFilterBar.getValue('filterCol'));
        var keyword = (kwFilterBar.getValue('filterVal') || '').trim().toLowerCase();
        if (!keyword) {
            renderKwBody(displayRows);
            countEl.innerHTML = '총 <strong>' + displayRows.length.toLocaleString() + '</strong>건';
            return;
        }
        var filtered = displayRows.filter(function(row) {
            var val = row[colIdx];
            return val !== null && val !== undefined && String(val).toLowerCase().indexOf(keyword) >= 0;
        });
        renderKwBody(filtered);
        countEl.innerHTML = '총 <strong>' + filtered.length.toLocaleString() + '</strong>건 (전체 ' + allRows.length.toLocaleString() + '건)';
    }

    function sortKwData(key, order) {
        var idx = colKeyToIdx[key];
        if (idx === undefined) return;
        displayRows.sort(function(a, b) {
            var va = a[idx], vb = b[idx];
            if (va == null) va = '';
            if (vb == null) vb = '';
            if (typeof va === 'string') va = va.toLowerCase();
            if (typeof vb === 'string') vb = vb.toLowerCase();
            if (va < vb) return order === 'asc' ? -1 : 1;
            if (va > vb) return order === 'asc' ? 1 : -1;
            return 0;
        });
        applyKwFilter();
    }

    function initKwTable() {
        kwTable = new CommonTable('#rawDataTableWrapper', {
            variant: 'detail',
            columns: [
                { key: '_no', label: 'No.', width: 50, sortable: false, align: 'center' },
                { key: 'product_line', label: '카테고리', width: 80, sortable: true },
                { key: 'content_type', label: '유형', width: 100, sortable: true },
                { key: 'keyword', label: '키워드', sortable: true },
                { key: 'is_active', label: '활성', width: 60, sortable: true, align: 'center' },
                { key: 'created_at', label: '등록일', width: 160, sortable: true }
            ],
            vlines: true,
            padding: '10px 12px',
            onSort: function(key, order) { sortKwData(key, order); }
        });
        kwTable.render();
    }

    function renderKwBody(rows) {
        kwTable.renderBody(rows, function(item, i) {
            return '<tr>' +
                '<td style="text-align:center">' + (i + 1) + '</td>' +
                '<td>' + esc(item[1] || '') + '</td>' +
                '<td>' + esc(item[2] || '') + '</td>' +
                '<td>' + esc(item[3] || '') + '</td>' +
                '<td style="text-align:center">' + (item[4] ? '✓' : '✗') + '</td>' +
                '<td>' + esc(item[5] || '') + '</td>' +
            '</tr>';
        });
    }
}

// ============================================================
// Section Data Loading
// ============================================================
async function loadSectionData() {
    if (rawView.checkUrlAndShow()) return;

    try {
        var selectedDate = getSelectedDate();
        try { currentCheckStatus = await loadCheckStatus(selectedDate); }
        catch (e) { currentCheckStatus = null; }

        var response = await fetch('/dx/layer1/api/stats/?date=' + selectedDate + '&check_type=market_competitor');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        var data = await response.json();
        currentStatsData = data;

        var check = data.checks ? data.checks.find(function(c) { return c.check_type === 'market_competitor'; }) : null;
        var checkIdx = check ? data.checks.indexOf(check) : 0;
        if (!check) check = { name: 'Market Competitor', description: '데이터 없음', check_type: 'market_competitor', status: 'PENDING', categories: [], is_target_date: false };

        var container = document.getElementById('section-content');
        var html = renderMarketCompetitorCheck(check, checkIdx);
        html = html.replace('<div class="check-item">', '<div class="check-item" data-check-type="market_competitor">');
        container.innerHTML = html;
        addCheckBadges();
        expandSectionContent();
    } catch (error) {
        console.error('Load failed:', error);
        document.getElementById('section-content').innerHTML = '<div class="check-item"><div class="check-main"><div class="check-info"><div class="check-name">데이터 로드 실패</div><div class="check-description">' + esc(error.message) + '</div></div></div></div>';
    }
}

function loadAllData() { loadSectionData(); }

window.onload = function() {
    var urlDate = new URLSearchParams(window.location.search).get('date');
    if (urlDate) localStorage.setItem('monitoringSelectedDate', urlDate);
    initFilterBar();
    loadAllData();
};
</script>
{% endblock %}
