{% extends 'base_layer2.html' %}
{% load static %}

{% block page_title %}대시보드{% endblock %}

{% block layer2_content %}
<!-- DX 요약 카드 -->
<div class="summary-grid" id="dx-summary">
    <div class="summary-card">
        <div class="label">총 이슈</div>
        <div class="value" id="dx-totalIssues">-</div>
    </div>
    <div class="summary-card">
        <div class="label">🔍 NULL 검증</div>
        <div class="value" id="dx-nullIssues">-</div>
    </div>
    <div class="summary-card">
        <div class="label">📋 형식 검증</div>
        <div class="value" id="dx-formatIssues">-</div>
    </div>
    <div class="summary-card">
        <div class="label">🔄 중복 검증</div>
        <div class="value" id="dx-duplicateIssues">-</div>
    </div>
</div>

<!-- DX 검증 결과 -->
<div id="dx-validation-container">
    <div class="loading">
        <div class="loading-spinner"></div>
        <p>데이터 로딩 중...</p>
    </div>
</div>
{% endblock %}

{% block layer2_js %}
<script src="{% static 'dx_layer2/js/layer2-common.js' %}?v=3"></script>
<script src="{% static 'dx_layer2/js/null_validation.js' %}?v=2"></script>
<script src="{% static 'dx_layer2/js/format_validation.js' %}?v=2"></script>
<script src="{% static 'dx_layer2/js/anomaly_validation.js' %}"></script>
<script src="{% static 'dx_layer2/js/dashboard.js' %}"></script>
{% endblock %}
