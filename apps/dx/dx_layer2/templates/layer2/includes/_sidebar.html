<div class="l2-sidebar" id="l2-sidebar">
    <div class="sidebar-header">
        <span class="sidebar-title">Layer 2 검증</span>
    </div>
    <nav class="sidebar-menu">
        <a href="/dx/layer2/" class="sidebar-item {% if section == 'dashboard' %}active{% endif %}">
            <span>📊</span> 대시보드
        </a>
        <div class="sidebar-group {% if section == 'null_validation' %}expanded{% endif %}">
            <div class="sidebar-item-row {% if section == 'null_validation' %}active{% endif %}">
                <a href="/dx/layer2/null/" class="sidebar-item-link">
                    <span>🔍</span> NULL 검증
                </a>
                <button class="sidebar-toggle" type="button">▶</button>
            </div>
            <div class="sidebar-subitems" id="sub-null">
                {% for item in sidebar_items.null %}
                <a class="sidebar-subitem" data-check="{{ item.key }}" onclick="onSubitemClick('null_validation', '{{ item.name|escapejs }}')">{{ item.name }}</a>
                {% endfor %}
            </div>
        </div>
        <div class="sidebar-group {% if section == 'format_validation' %}expanded{% endif %}">
            <div class="sidebar-item-row {% if section == 'format_validation' %}active{% endif %}">
                <a href="/dx/layer2/format/" class="sidebar-item-link">
                    <span>📋</span> 형식 검증
                </a>
                <button class="sidebar-toggle" type="button">▶</button>
            </div>
            <div class="sidebar-subitems" id="sub-format">
                {% for item in sidebar_items.format %}
                <a class="sidebar-subitem" data-check="{{ item.key }}" onclick="onSubitemClick('format_validation', '{{ item.name|escapejs }}')">{{ item.name }}</a>
                {% endfor %}
            </div>
        </div>
        <div class="sidebar-group {% if section == 'anomaly_validation' %}expanded{% endif %}">
            <div class="sidebar-item-row {% if section == 'anomaly_validation' %}active{% endif %}">
                <a href="/dx/layer2/anomaly/" class="sidebar-item-link">
                    <span>🔄</span> 중복 검증
                </a>
                <button class="sidebar-toggle" type="button">▶</button>
            </div>
            <div class="sidebar-subitems" id="sub-anomaly">
                {% for item in sidebar_items.anomaly %}
                <a class="sidebar-subitem" data-check="{{ item.key }}" onclick="onSubitemClick('anomaly_validation', '{{ item.name|escapejs }}')">{{ item.name }}</a>
                {% endfor %}
            </div>
        </div>
    </nav>
</div>
