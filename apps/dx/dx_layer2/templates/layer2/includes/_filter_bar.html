<div class="filter-section">
    {% if section != 'dashboard' %}
    <span class="filter-section-title">{{ section_title }}</span>
    <span class="filter-divider"></span>
    {% endif %}
    <div class="filter-left">
        <div class="filter-group">
            <label for="target-date">조회 날짜</label>
            <input type="date" id="target-date" class="filter-input">
            <span id="weekday-display" style="margin-left: 8px; font-weight: 500; color: var(--text-secondary);"></span>
        </div>
        <button class="search-btn" onclick="handleSearch()">조회</button>
        <button class="today-btn" onclick="setPrevDay()">전날</button>
        <button class="today-btn" onclick="setNextDay()">다음날</button>
    </div>
    <div class="filter-right">
        <span class="current-info" id="current-info"></span>
    </div>
</div>
