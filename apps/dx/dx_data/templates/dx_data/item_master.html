{% extends "base.html" %}
{% load static %}

{% block title %}아이템 마스터 관리 — DX 데이터 관리{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'dx_data/css/item_master.css' %}">
{% endblock %}

{% block content %}
<div class="data-layout">
    <!-- 좌측 사이드바 -->
    <aside class="data-sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">데이터 관리</span>
        </div>
        <div class="sidebar-menu">
            <a href="/dx/data/item-master/" class="sidebar-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                </svg>
                아이템 마스터
            </a>
            <a href="/dx/data/history/" class="sidebar-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                변경 이력
            </a>
        </div>
    </aside>

    <!-- 우측 콘텐츠 -->
    <div class="data-content">
        <div class="page-header">
            <h1>아이템 마스터 관리</h1>
            <p>TV 아이템의 제품 여부를 분류합니다</p>
        </div>

        <div class="white-card-frame">
            <div class="header-action-row">
                <!-- 탭 -->
                <div class="tab-group">
                    <button class="tab-btn active" data-table="tv" onclick="switchTab('tv')">TV</button>
                </div>

                <!-- 저장 바 -->
                <div class="save-bar" id="saveBar">
                    <span class="save-bar-count" id="saveCount">0건 변경됨</span>
                    <button class="save-bar-cancel" onclick="cancelChanges()">취소</button>
                    <button class="save-bar-btn" id="saveBtn" onclick="saveChanges()">저장</button>
                </div>
            </div>

            <!-- 필터 바 (공통 JS 컴포넌트) -->
            <div id="dxFilterBar"></div>

            <div id="tableWrapper">
                <!-- 테이블 (공통 JS 컴포넌트) -->
                <div id="tableContainer"></div>

                <!-- 페이지네이션 (공통 JS 컴포넌트) -->
                <div id="paginationContainer"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/filter-bar.js' %}"></script>
<script src="{% static 'js/table.js' %}"></script>
<script src="{% static 'js/pagination.js' %}"></script>
    <script>
        const currentUserId = '{{ user.username|escapejs }}';
    </script>
    <script src="{% static 'dx_data/js/item_master.js' %}"></script>
{% endblock %}
