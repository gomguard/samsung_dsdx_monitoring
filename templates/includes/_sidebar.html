<div class="dx-sidebar" id="dx-sidebar" data-base-url="{{ sidebar_base_url }}">
    <div class="sidebar-header">
        <span class="sidebar-title">{{ sidebar_title }}</span>
        <button class="sidebar-collapse-btn" type="button" title="사이드바 접기">
            <span class="toggle-arrow">«</span>
        </button>
    </div>
    <nav class="sidebar-menu">
        <a href="{{ sidebar_base_url }}" class="sidebar-item {% if section == 'dashboard' %}active{% endif %}">
            <span class="sidebar-icon">📊</span>
            <span class="sidebar-text">대시보드</span>
        </a>
        {% for group in sidebar_groups %}
        <div class="sidebar-group {% if group.expanded %}expanded{% endif %}">
            <div class="sidebar-item-row {% if group.active %}active{% endif %}"
                 onclick="navigateSidebarGroup(this)" data-key="{{ group.key }}">
                <span class="sidebar-icon">{{ group.icon }}</span>
                <span class="sidebar-text">{{ group.label }}</span>
                <span class="sidebar-arrow" onclick="event.stopPropagation(); toggleSidebarGroup(this)">▶</span>
            </div>
            <div class="sidebar-subitems">
                {% for item in group.items %}
                <a class="sidebar-subitem {% if item.active %}active{% endif %}"
                   onclick="onSubitemClick('{{ group.key }}', '{{ item.name|escapejs }}')">
                    {{ item.name }}
                </a>
                {% endfor %}
            </div>
        </div>
        {% endfor %}
    </nav>
</div>
